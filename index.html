<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Client Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 2rem;
            background: #0f172a;
            color: #f8fafc;
        }
        .card {
            max-width: 720px;
            margin: 0 auto;
            background: #111827;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }
        input, textarea, button {
            width: 100%;
            padding: 0.8rem;
            border-radius: 8px;
            border: 1px solid #334155;
            margin-top: 0.75rem;
            font-size: 1rem;
        }
        button {
            background: #2563eb;
            color: white;
            cursor: pointer;
            border: none;
        }
        .response {
            margin-top: 1rem;
            padding: 1rem;
            background: #1f2937;
            border-radius: 8px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Cliente de IA</h1>
        <p>Envie uma mensagem para o seu backend de IA.</p>
        <input id="url" type="text" value="https://jarvis-ecru-three.vercel.app" placeholder="URL do backend" />
        <textarea id="message" rows="5" placeholder="Digite sua mensagem"></textarea>
        <button onclick="sendMessage()">Enviar</button>
        <div id="response" class="response">Aguardando mensagem...</div>
    </div>

    <script>
        async function sendMessage() {
            const urlInput = document.getElementById('url');
            const messageInput = document.getElementById('message');
            const responseBox = document.getElementById('response');

            const baseUrl = (urlInput.value || '').trim();
            const endpoint = baseUrl.endsWith('/chat') ? baseUrl : `${baseUrl}/chat`;
            const payload = {
                message: messageInput.value,
                history: []
            };

            responseBox.textContent = 'Enviando...';

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                if (data && data.success) {
                    responseBox.textContent = data.response || 'Sem resposta.';
                } else {
                    responseBox.textContent = data.error || 'Erro desconhecido.';
                }
            } catch (error) {
                responseBox.textContent = error.message || 'Falha na requisição.';
            }
        }
    </script>
</body>
</html>
